name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      server_release_created: ${{ steps.release.outputs['server--release_created'] }}
      server_tag_name: ${{ steps.release.outputs['server--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # --- GO SERVER ASSETS ---
      - name: Install tools with mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build Server Binaries
        run: mise run dist
        working-directory: server

      # --- ATTACH TO RELEASE ---
      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ needs.release-please.outputs.server_tag_name }}" ]; then
            gh release upload "${{ needs.release-please.outputs.server_tag_name }}" server/dist/*.tar.gz server/dist/*.zip
          fi

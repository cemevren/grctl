name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tools with mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Verify dependencies
        run: |
          cd server
          mise run tidy
          git diff --exit-code go.mod go.sum

      - name: Lint
        run: mise run -C server lint

      - name: Run tests
        run: mise run -C server test

      - name: Build
        run: mise run -C server build

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: grctl-linux-amd64
          path: |
            server/bin/grctld
            server/bin/grctl
          retention-days: 7
